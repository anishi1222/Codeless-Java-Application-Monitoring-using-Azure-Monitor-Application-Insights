kind: Service
apiVersion: v1
metadata:
  name: micronaut-quickstart-mp
  labels:
    app: micronaut-quickstart-mp
spec:
  type: NodePort
  selector:
    app: micronaut-quickstart-mp
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: codelessapp-micronaut
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codelessapp-micronaut
  template:
    metadata:
      labels:
        app: codelessapp-micronaut
        version: v1
    spec:
      containers:
      - name: codelessapp-micronaut
        image: codelessapp-micronaut
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
